<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Sebuah surat kecil untuk Fayya." />
    <meta name="robots" content="noindex, nofollow" />
    <meta property="og:title" content="untuk Fayya" />
    <meta property="og:description" content="Sebuah surat kecil untuk Fayya." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://kesayangan-acu.lovable.app/" />
    <link rel="canonical" href="https://kesayangan-acu.lovable.app/" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600&family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
    <title>untuk Fayya</title>
    <style>
      :root {
        --ink: oklch(0.34 0.045 30);
        --paper: oklch(0.985 0.012 80);
        --font-serif: "Cormorant Garamond", Georgia, serif;
        --font-hand: "Caveat", "Cormorant Garamond", cursive;
        --font-sans: "Inter", system-ui, sans-serif;
      }

      * { box-sizing: border-box; }
      html, body, #app { height: 100%; margin: 0; }
      body {
        overflow: hidden;
        color: var(--ink);
        font-family: var(--font-serif);
        background:
          radial-gradient(1200px 800px at 10% 0%, oklch(0.95 0.05 25) 0%, transparent 60%),
          radial-gradient(1000px 700px at 90% 100%, oklch(0.93 0.05 60) 0%, transparent 55%),
          linear-gradient(180deg, oklch(0.97 0.02 25), oklch(0.94 0.035 35));
        -webkit-font-smoothing: antialiased;
      }

      button { font: inherit; }
      .stage { position: relative; width: 100vw; height: 100dvh; overflow: hidden; }
      .slide { position: absolute; inset: 0; animation: fade .7s ease both; }
      @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
      .center { display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; padding: 24px; }

      .paper-card {
        position: relative;
        z-index: 5;
        width: min(520px, calc(100vw - 44px));
        padding: 2.1rem 2.25rem;
        border-radius: 2px;
        background: var(--paper);
        background-image: repeating-linear-gradient(0deg, transparent 0 28px, oklch(0.85 0.04 25 / .18) 28px 29px);
        background-position: 0 12px;
        box-shadow: 0 1px 0 oklch(1 0 0 / .7) inset, 0 12px 30px -10px oklch(0.55 0.08 25 / .25), 0 30px 60px -30px oklch(0.45 0.1 25 / .25);
        transform: rotate(-.5deg);
      }
      .paper-card:before, .paper-card:after {
        content: "";
        position: absolute;
        top: -10px;
        width: 90px;
        height: 22px;
        border: 1px solid oklch(0.85 0.04 25 / .5);
        border-radius: 1px;
        background: oklch(0.92 0.04 25 / .7);
      }
      .paper-card:before { left: 24px; transform: rotate(-4deg); }
      .paper-card:after { right: 24px; transform: rotate(5deg); }
      .hand { margin: 0; white-space: pre-line; text-align: center; color: var(--ink); font-family: var(--font-hand); font-size: clamp(2rem, 8vw, 3rem); line-height: 1.2; }
      .subtle { font-family: var(--font-sans); font-size: .72rem; letter-spacing: .3em; text-transform: uppercase; color: color-mix(in oklab, var(--ink) 50%, transparent); }

      .envelope-screen { display: flex; height: 100%; flex-direction: column; align-items: center; justify-content: center; gap: 40px; padding: 24px; }
      .to { margin: 0; font-family: var(--font-hand); font-size: 1.7rem; color: color-mix(in oklab, var(--ink) 70%, transparent); }
      .envelope-wrap { perspective: 1200px; }
      .envelope {
        position: relative;
        width: min(360px, calc(100vw - 54px));
        aspect-ratio: 3 / 2;
        border: 0;
        border-radius: 6px;
        cursor: pointer;
        background: linear-gradient(180deg, oklch(0.93 0.06 25), oklch(0.88 0.08 20));
        box-shadow: 0 30px 60px -20px oklch(0.45 0.1 25 / .45), inset 0 0 0 1px oklch(0.78 0.08 20 / .4);
        transition: transform .25s ease;
      }
      .envelope:hover { transform: scale(1.03); }
      .envelope:before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 6px;
        background:
          linear-gradient(135deg, transparent 49.5%, oklch(0.82 0.08 20 / .6) 50%, transparent 50.5%) bottom left / 50% 50% no-repeat,
          linear-gradient(225deg, transparent 49.5%, oklch(0.82 0.08 20 / .6) 50%, transparent 50.5%) bottom right / 50% 50% no-repeat;
      }
      .flap {
        position: absolute;
        inset: 0 0 auto 0;
        height: 50%;
        clip-path: polygon(0 0, 100% 0, 50% 100%);
        transform-origin: top center;
        z-index: 3;
        background: linear-gradient(180deg, oklch(0.95 0.06 20), oklch(0.86 0.09 18));
        box-shadow: 0 4px 10px oklch(0.5 0.1 25 / .2);
        transition: transform 1s cubic-bezier(.6,.05,.2,1);
      }
      .seal {
        position: absolute;
        top: 28%;
        left: 50%;
        z-index: 4;
        display: grid;
        width: 64px;
        height: 64px;
        place-items: center;
        border-radius: 999px;
        color: oklch(0.97 0.02 25);
        font-family: var(--font-hand);
        font-size: 1.6rem;
        background: radial-gradient(circle at 30% 30%, oklch(0.78 0.18 22), oklch(0.55 0.2 22));
        box-shadow: 0 6px 18px oklch(0.45 0.18 22 / .45), inset 0 -6px 10px oklch(0.4 0.18 22 / .5);
        transform: translate(-50%, -50%);
        transition: opacity .4s ease;
      }
      .letter {
        position: absolute;
        left: 50%;
        top: 50%;
        z-index: 2;
        width: min(320px, calc(100vw - 76px));
        min-height: 190px;
        padding: 1.2rem;
        border: 0;
        border-radius: 2px;
        cursor: pointer;
        opacity: 0;
        pointer-events: none;
        color: var(--ink);
        background: var(--paper);
        box-shadow: 0 1px 0 oklch(1 0 0 / .7) inset, 0 18px 40px -10px oklch(0.45 0.1 25 / .35);
        transform: translate(-50%, -50%);
        transition: transform 1s cubic-bezier(.2,.8,.2,1), opacity 1s ease;
      }
      .opened .flap { transform: rotateX(180deg); }
      .opened .seal { opacity: 0; }
      .opened .letter { opacity: 1; pointer-events: auto; transform: translate(-50%, -115%); }

      .bubble { position: absolute; border-radius: 999px; background: oklch(0.95 0.04 25 / .75); border: 1px solid oklch(0.85 0.06 25 / .5); box-shadow: inset 0 6px 12px oklch(1 0 0 / .6), inset 0 -8px 18px oklch(0.75 0.1 25 / .18), 0 20px 40px -20px oklch(0.55 0.1 25 / .4); }
      .bubble-img { position: absolute; z-index: 2; display: grid; place-items: center; overflow: hidden; border: 1px solid oklch(0.82 0.06 25 / .55); border-radius: 999px; background: radial-gradient(circle at 30% 25%, oklch(1 0 0 / .9), oklch(0.92 0.05 25 / .4) 45%, transparent 70%), oklch(0.94 0.045 25 / .85); box-shadow: inset 0 8px 18px oklch(1 0 0 / .55), inset 0 -10px 22px oklch(0.7 0.12 25 / .18), 0 25px 50px -20px oklch(0.55 0.1 25 / .4); animation: drift 6s ease-in-out infinite; }
      .bubble-img img { width: 78%; height: 78%; object-fit: contain; filter: drop-shadow(0 6px 10px oklch(0.55 0.1 25 / .25)); }
      @keyframes drift { 0%, 100% { translate: 0 0; rotate: 0deg; } 50% { translate: 0 -10px; rotate: 2deg; } }
      .msg-wrap { position: relative; display: flex; height: 100%; align-items: center; justify-content: center; padding: 24px; }
      .choice-wrap { display: flex; flex-wrap: wrap; justify-content: center; gap: 18px; margin-top: 30px; }
      .choice-btn, .soft-btn {
        cursor: pointer;
        border: 1px solid oklch(0.82 0.08 18 / .7);
        color: var(--ink);
        background: linear-gradient(180deg, oklch(0.98 0.02 25), oklch(0.93 0.05 18));
        box-shadow: inset 0 1px 0 oklch(1 0 0 / .8), 0 18px 40px -12px oklch(0.55 0.12 18 / .45);
        transition: transform .25s ease;
      }
      .choice-btn { padding: 1rem 1.8rem; border-radius: 999px; font-family: var(--font-serif); font-size: 1.45rem; }
      .choice-btn:hover, .soft-btn:hover { transform: translateY(-2px); }
      .controls { pointer-events: none; position: absolute; inset: auto 0 24px; z-index: 50; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; }
      .controls > * { pointer-events: auto; }
      .soft-btn { min-width: 52px; padding: .55rem 1rem; border-radius: 999px; font-family: var(--font-sans); font-size: .95rem; background: oklch(0.98 0.02 25 / .75); }
      .count { align-self: center; font-family: var(--font-sans); font-size: .72rem; letter-spacing: .28em; color: color-mix(in oklab, var(--ink) 50%, transparent); }
      .final { background: radial-gradient(900px 700px at 50% 30%, oklch(0.96 0.04 25) 0%, transparent 60%), linear-gradient(180deg, oklch(0.94 0.035 25), oklch(0.9 0.05 35)); }
      .heart { position: absolute; color: oklch(0.72 0.14 18 / .6); animation: rise 10s linear infinite; }
      @keyframes rise { from { transform: translateY(110vh); opacity: 0; } 15%, 85% { opacity: 1; } to { transform: translateY(-20vh); opacity: 0; } }

      @media (max-width: 700px) {
        .side-big { width: 150px !important; height: 150px !important; top: 12% !important; }
        .side-big.left { left: 4% !important; }
        .side-big.right { right: 4% !important; }
        .paper-card { padding: 1.8rem 1.5rem; }
        .controls { padding: 0 18px; }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script>
      const imgs = {
        p1: "/__l5e/assets-v1/4db24f26-098e-4d41-987a-a4b87fa68f9a/plushie1.jpg",
        p2: "/__l5e/assets-v1/6a50d086-5fb4-4ec0-9f33-135fa5ecf220/plushie2.jpg",
        p3: "/__l5e/assets-v1/39f35649-d11d-4a88-8135-4e07c89b831a/plushie3.jpg",
        p4: "/__l5e/assets-v1/a354e5ee-35d2-43d2-b86b-85e01dc3097b/plushie4.jpg",
        p5: "/__l5e/assets-v1/e2ba676a-47ee-43d8-b9d8-dcea8c82b7fe/plushie5.jpg",
        p6: "/__l5e/assets-v1/5ff24725-a458-463e-90e5-ada98c1d044f/plushie6.jpg",
        you: "/__l5e/assets-v1/7f7acec5-d907-4e6f-9779-86a111e63773/you.jpg"
      };
      const plushieSlides = [
        { plushie: "p1", side: "left", message: "Hai Fayya... aku Domo.\nKatanya hari ini buat kamu spesial.", signed: "Domo" },
        { plushie: "p2", side: "right", message: "Aku Labubu!\nMau bilang kamu lucu hari ini... dan setiap hari.", signed: "Labubu" },
        { plushie: "p3", side: "left", message: "Psst, ini Stitch.\nKamu dipeluk dari jauh ya, hangat-hangat.", signed: "Stitch" },
        { plushie: "p4", side: "right", message: "Kelinci datang!\nJangan lupa senyum dulu sebelum lanjut, oke?", signed: "Kelinci" }
      ];
      let slide = 1;
      let choice = null;
      let opened = false;
      let audioCtx = null;
      let musicTimer = null;
      let musicOn = false;

      function startMusic() {
        if (musicOn) return;
        try {
          audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
          const notes = [523.25, 659.25, 783.99, 659.25];
          let i = 0;
          musicOn = true;
          musicTimer = setInterval(() => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.value = notes[i++ % notes.length];
            osc.type = "sine";
            gain.gain.setValueAtTime(0.0001, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.045, audioCtx.currentTime + 0.02);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.45);
            osc.connect(gain).connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.5);
          }, 650);
        } catch (_) {}
      }
      function stopMusic() { clearInterval(musicTimer); musicTimer = null; musicOn = false; }
      function next() {
        if (slide === 8 || slide === 11) return;
        slide = slide === 9 || slide === 10 ? 11 : slide + 1;
        if (slide >= 2 && slide < 11) startMusic();
        if (slide === 11) stopMusic();
        render();
      }
      function prev() {
        if (slide <= 1) return;
        slide = slide === 11 ? (choice === "buruk" ? 10 : 9) : (slide === 9 || slide === 10 ? 8 : slide - 1);
        render();
      }
      function paper(text, signed = "") {
        return `<div class="paper-card"><p class="hand">${text}</p>${signed ? `<p style="margin:18px 0 0;text-align:right;font-family:var(--font-hand);font-size:1.35rem;color:color-mix(in oklab,var(--ink) 70%,transparent)">— ${signed}</p>` : ""}</div>`;
      }
      function decor() {
        return `<span class="bubble" style="top:12%;left:6%;width:70px;height:70px"></span><span class="bubble" style="top:70%;left:10%;width:50px;height:50px"></span><span class="bubble" style="top:15%;right:8%;width:60px;height:60px"></span><span class="bubble" style="bottom:14%;right:8%;width:70px;height:70px"></span>`;
      }
      function bubble(key, cls, style) { return `<div class="bubble-img ${cls}" style="${style}"><img src="${imgs[key]}" alt="" /></div>`; }
      function envelope() {
        return `<div class="slide envelope-screen"><p class="to">untuk Fayya</p><div class="envelope-wrap"><button class="envelope ${opened ? "opened" : ""}" onclick="openEnvelope()"><span class="flap"></span><span class="seal">♡</span><span class="letter" onclick="event.stopPropagation(); next()"><p class="hand" style="font-size:2.25rem">Mau dibuka ya?</p><p class="subtle">ketuk untuk lanjut</p></span></button></div>${opened ? "" : `<p class="subtle">ketuk amplopnya</p>`}</div>`;
      }
      function plushie(sl) {
        const isLeft = sl.side === "left";
        return `<div class="slide msg-wrap">${decor()}${bubble(sl.plushie, `side-big ${isLeft ? "left" : "right"}`, `width:260px;height:260px;top:50%;${isLeft ? "left" : "right"}:6%;transform:translateY(-50%)`)}${paper(sl.message, sl.signed)}</div>`;
      }
      function dual() {
        return `<div class="slide msg-wrap">${decor()}${bubble("p5", "side-big left", "width:245px;height:245px;top:50%;left:5%;transform:translateY(-50%)")}${bubble("p6", "side-big right", "width:245px;height:245px;top:50%;right:5%;transform:translateY(-50%)")}${paper("Kami berdua mau bilang...\nkamu disayang banget hari ini.\nSama dia juga.")}</div>`;
      }
      function reveal() {
        return `<div class="slide msg-wrap">${["p1","p2","p3","p4","p5","p6"].map((k,i)=>bubble(k,"",`width:${90+i%3*16}px;height:${90+i%3*16}px;${i<3?`top:${8+i*8}%;`:`bottom:${8+i*3}%;`}${i%2?`right:${8+i*3}%;`:`left:${7+i*2}%;`}`)).join("")}${bubble("you", "", "position:relative;width:min(320px,70vw);height:min(320px,70vw)")}${paper("Hai... akhirnya aku muncul juga di sini, Fay.")}</div>`;
      }
      function choose() {
        return `<div class="slide msg-wrap" style="flex-direction:column;gap:10px">${["p1","p2","p3","p4","p5","you"].map((k,i)=>bubble(k,"",`width:${90+i%3*15}px;height:${90+i%3*15}px;top:${8+i*4}%;${i%2?"right":"left"}:${8+i*6}%`)).join("")}${paper("Aku punya dua kabar...\nmau dengar yang mana dulu?")}<div class="choice-wrap"><button class="choice-btn" onclick="choice='baik';slide=9;render()">Kabar Baik</button><button class="choice-btn" onclick="choice='buruk';slide=10;render()">Kabar Buruk</button></div></div>`;
      }
      function finalSlide() {
        return `<div class="slide center final">${Array.from({length:14},(_,i)=>`<span class="heart" style="left:${(i*7+5)%100}%;font-size:${18+(i%4)*6}px;animation-delay:${i*.4}s">♡</span>`).join("")}<div style="z-index:5;max-width:640px;text-align:center"><p class="hand" style="font-size:clamp(3rem,10vw,4.6rem)">Terima kasih sudah baca sampai habis, Fayya.\nIni semua, buat kamu. ♡</p><p class="subtle" style="margin-top:38px">— selesai —</p></div></div>`;
      }
      function controls() {
        if (slide === 1) return "";
        return `<div class="controls"><button class="soft-btn" onclick="prev()">←</button><div style="display:flex;align-items:center;gap:12px"><button class="soft-btn" onclick="musicOn?stopMusic():startMusic();render()">♪ ${musicOn ? "on" : "off"}</button><span class="count">${slide} / 11</span></div>${slide !== 8 && slide !== 11 ? `<button class="soft-btn" onclick="next()">→</button>` : `<span style="width:52px"></span>`}</div>`;
      }
      function openEnvelope() { if (!opened) { opened = true; render(); } }
      function render() {
        const views = { 1: envelope, 2: () => plushie(plushieSlides[0]), 3: () => plushie(plushieSlides[1]), 4: () => plushie(plushieSlides[2]), 5: () => plushie(plushieSlides[3]), 6: dual, 7: reveal, 8: choose, 9: () => `<div class="slide msg-wrap">${decor()}${paper("Kabar baiknya...\naku sayang kamu.\nBeneran. Setiap hari, sedikit lebih banyak.")}</div>`, 10: () => `<div class="slide msg-wrap" style="background:linear-gradient(180deg,oklch(0.95 0.02 230),oklch(0.92 0.03 250))">${decor()}${paper("Kabar buruknya...\naku gak bisa berhenti mikirin kamu.\nKayaknya gak akan sembuh.")}</div>`, 11: finalSlide };
        document.getElementById("app").innerHTML = `<main class="stage">${views[slide]()}${controls()}</main>`;
      }
      window.addEventListener("keydown", e => { if (slide === 1 || slide === 8) return; if (e.key === "ArrowRight" || e.key === " ") next(); if (e.key === "ArrowLeft") prev(); });
      render();
    </script>
  </body>
</html>
